<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyLearn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <!-- Skulpt: Python in the browser -->
  <script src="https://skulpt.org/js/skulpt.min.js"></script>
  <script src="https://skulpt.org/js/skulpt-stdlib.js"></script>
  <!-- SheetJS: xlsx export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .step-pill  { transition: background 0.15s, color 0.15s; }
    .lesson-tab { transition: background 0.15s, border-color 0.15s; }
    #step-content pre { white-space: pre-wrap; }

    /* ── Python Editor ────────────────────────────────────────── */
    .pylearn-editor-wrap { border: 1px solid #d1d5db; border-radius: 0.5rem; overflow: hidden; margin-bottom: 0.75rem; }
    .pylearn-editor-header { background: #1e293b; color: #94a3b8; font-size: 0.72rem; padding: 0.3rem 0.75rem; display: flex; justify-content: space-between; align-items: center; }
    .pylearn-header-tools { display: flex; align-items: center; gap: 0.5rem; }
    .pylearn-btn-reset { background: transparent; color: #94a3b8; border: 1px solid #334155; border-radius: 0.25rem; padding: 0.05rem 0.45rem; font-size: 0.7rem; cursor: pointer; font-family: inherit; }
    .pylearn-btn-reset:hover { color: #cbd5e1; border-color: #475569; background: #334155; }
    .pylearn-code-area { width: 100%; background: #0f172a; color: #e2e8f0; font-family: 'Courier New', Courier, monospace; font-size: 0.9rem; line-height: 1.6; padding: 0.75rem; border: none; resize: vertical; min-height: 180px; outline: none; tab-size: 4; box-sizing: border-box; }
    .pylearn-output-area { background: #1e293b; color: #a3e635; font-family: 'Courier New', Courier, monospace; font-size: 0.82rem; padding: 0.6rem 0.75rem; min-height: 2rem; max-height: 200px; overflow-y: auto; white-space: pre-wrap; border-top: 1px solid #334155; }
    .pylearn-output-area.has-error { color: #f87171; }
    .pylearn-output-area.pylearn-output-listening { box-shadow: inset 0 0 0 2px #2563eb; color: #e2e8f0; }
    .pylearn-output-area.pylearn-output-listening::before { content: ''; }
    .pylearn-toolbar { background: #1e293b; padding: 0.35rem 0.6rem; border-top: 1px solid #334155; display: flex; gap: 0.5rem; align-items: center; }
    .pylearn-btn-run { background: #2563eb; color: #fff; border: none; border-radius: 0.3rem; padding: 0.25rem 0.75rem; font-size: 0.8rem; cursor: pointer; }
    .pylearn-btn-run:hover { background: #1d4ed8; }
    .pylearn-btn-run:disabled { opacity: 0.5; cursor: default; }
    .pylearn-btn-clear { background: transparent; color: #64748b; border: 1px solid #334155; border-radius: 0.3rem; padding: 0.25rem 0.6rem; font-size: 0.8rem; cursor: pointer; }
    .pylearn-btn-clear:hover { color: #94a3b8; border-color: #475569; }
    .pylearn-status { font-size: 0.75rem; color: #64748b; margin-left: auto; }
    .pylearn-status.ok  { color: #4ade80; }
    .pylearn-status.err { color: #f87171; }
    .pylearn-status.run { color: #60a5fa; }
    .pylearn-feedback { border-radius: 0.375rem; padding: 0.5rem 0.75rem; font-size: 0.85rem; margin-top: 0.5rem; }
    .pylearn-feedback.pass { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
    .pylearn-feedback.fail { background: #fff7ed; border: 1px solid #fdba74; color: #9a3412; }
    .pylearn-feedback.err  { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }

    /* spinner */
    .spinner { border: 2px solid #e5e7eb; border-top-color: #6b7280; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<!-- ── TOP BAR ─────────────────────────────────────────────── -->
<header class="bg-white border-b border-gray-200 shadow-sm">
  <div class="flex items-center justify-between px-4 h-12">
    <span class="text-blue-600 font-bold text-lg tracking-tight">PyLearn</span>
    <div id="lesson-tabs" class="flex gap-1 overflow-x-auto flex-1 mx-4"></div>
    <div class="flex items-center gap-2 shrink-0">
      <select id="year-group-select" class="text-sm border border-gray-300 rounded px-2 py-1 bg-white text-gray-700 focus:outline-none focus:border-blue-400"></select>
      <span id="user-label" class="text-sm text-gray-500"></span>
      <button id="btn-login"  class="text-sm px-3 py-1 rounded border border-gray-300 hover:bg-gray-50">Login</button>
      <button id="btn-logout" class="hidden text-sm px-3 py-1 rounded border border-gray-300 hover:bg-gray-50">Logout</button>
      <button id="btn-report" class="hidden text-sm px-3 py-1 rounded border border-blue-300 text-blue-600 hover:bg-blue-50">Export Report</button>
      <button id="btn-admin"  class="hidden text-sm px-3 py-1 rounded bg-gray-800 text-white hover:bg-gray-700">Admin</button>
    </div>
  </div>
  <div id="step-bar" class="flex gap-1 px-4 py-2 bg-gray-50 border-t border-gray-100 overflow-x-auto"></div>
</header>

<!-- ── MAIN ───────────────────────────────────────────────── -->
<main class="flex-1 flex flex-col">
  <div id="loading-screen" class="flex-1 flex items-center justify-center">
    <div class="text-center text-gray-500">
      <div class="spinner mx-auto mb-3"></div>
      <p class="text-sm">Loading lessons…</p>
    </div>
  </div>
  <div id="app-content" class="hidden flex-1 flex flex-col">
    <div id="step-content" class="flex-1 p-6 max-w-3xl w-full mx-auto"></div>
    <div class="border-t border-gray-200 bg-white px-6 py-3 flex justify-between items-center max-w-3xl w-full mx-auto">
      <button id="btn-prev" class="px-4 py-1.5 rounded border border-gray-300 text-sm hover:bg-gray-50 disabled:opacity-40">&#8592; Previous</button>
      <span id="step-counter" class="text-sm text-gray-500"></span>
      <button id="btn-next" class="px-4 py-1.5 rounded bg-blue-600 text-white text-sm hover:bg-blue-700 disabled:opacity-40">Next Step &#8594;</button>
    </div>
  </div>
</main>

<!-- ── LOGIN MODAL ────────────────────────────────────────── -->
<div id="modal-login" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-xl p-6 w-80">
    <h2 class="text-lg font-semibold mb-4">Login</h2>
    <label class="block text-sm text-gray-600 mb-1">First Name</label>
    <input id="input-first" type="text" class="w-full border border-gray-300 rounded px-3 py-1.5 mb-3 text-sm focus:outline-none focus:border-blue-400" placeholder="e.g. Alice" />
    <label class="block text-sm text-gray-600 mb-1">Last Name</label>
    <input id="input-last"  type="text" class="w-full border border-gray-300 rounded px-3 py-1.5 mb-3 text-sm focus:outline-none focus:border-blue-400" placeholder="e.g. Smith" />
    <label class="block text-sm text-gray-600 mb-1">Login Code</label>
    <input id="input-code"  type="text" class="w-full border border-gray-300 rounded px-3 py-1.5 mb-1 text-sm focus:outline-none focus:border-blue-400 uppercase" placeholder="Enter your code" />
    <p id="login-error" class="text-red-500 text-xs mb-3 hidden"></p>
    <div class="flex gap-2 mt-2">
      <button id="btn-login-cancel" class="flex-1 py-1.5 rounded border border-gray-300 text-sm hover:bg-gray-50">Cancel</button>
      <button id="btn-login-submit" class="flex-1 py-1.5 rounded bg-blue-600 text-white text-sm hover:bg-blue-700">Login</button>
    </div>
  </div>
</div>

<!-- ── ADMIN MODAL ────────────────────────────────────────── -->
<div id="modal-admin" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-4xl max-h-[90vh] flex flex-col">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-semibold">Admin Panel</h2>
      <button id="btn-admin-close" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&#x2715;</button>
    </div>

    <!-- Top toolbar: generate / add / import -->
    <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-4">
      <!-- Bulk generate -->
      <p class="text-sm font-medium text-gray-700 mb-3">Generate codes for a class</p>
      <div class="flex gap-2 items-end mb-3">
        <div class="flex-1">
          <label class="block text-xs text-gray-500 mb-1">Class name</label>
          <input id="input-class-name" type="text" placeholder="e.g. 7Y1"
            class="w-full border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-400 uppercase" />
        </div>
        <div class="w-28">
          <label class="block text-xs text-gray-500 mb-1">Number of codes</label>
          <input id="input-code-count" type="number" min="1" max="60" value="30"
            class="w-full border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-400" />
        </div>
        <button id="btn-gen-codes" class="px-4 py-1.5 rounded bg-green-600 text-white text-sm hover:bg-green-700 whitespace-nowrap">Generate Codes</button>
        <button id="btn-refresh-codes" class="px-3 py-1.5 rounded border border-gray-300 text-sm hover:bg-gray-50">Refresh</button>
      </div>
      <!-- Add single + import -->
      <div class="flex gap-2 items-end border-t border-gray-200 pt-3">
        <div class="flex-1">
          <label class="block text-xs text-gray-500 mb-1">Add one student to existing class</label>
          <input id="input-single-class" type="text" placeholder="Class name (e.g. 7Y1)"
            class="w-full border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-400 uppercase" />
        </div>
        <button id="btn-add-single" class="px-4 py-1.5 rounded bg-blue-600 text-white text-sm hover:bg-blue-700 whitespace-nowrap">Add One Code</button>
        <div class="border-l border-gray-200 pl-3 flex gap-2 items-end">
          <div>
            <label class="block text-xs text-gray-500 mb-1">Import names from spreadsheet</label>
            <input type="file" id="input-import-names" accept=".xlsx,.xls" class="hidden" />
            <button id="btn-import-names" class="px-3 py-1.5 rounded border border-purple-300 text-purple-700 text-sm hover:bg-purple-50 whitespace-nowrap">&#x1F4C2; Import Names</button>
          </div>
        </div>
      </div>
      <div id="import-status" class="text-xs mt-2 text-gray-500 hidden"></div>
      <p id="gen-status" class="text-xs mt-1 text-gray-500 hidden"></p>
    </div>

    <!-- Classes table -->
    <div class="overflow-y-auto flex-1" id="admin-classes-container">
      <p class="text-gray-400 text-sm text-center py-4">Loading&#8230;</p>
    </div>
  </div>
</div>

<!-- ── REPORT MODAL ───────────────────────────────────────── -->
<div id="modal-report" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-lg max-h-[80vh] flex flex-col">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-semibold">Progress Report</h2>
      <button id="btn-report-close" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&#x2715;</button>
    </div>
    <div id="report-content" class="overflow-y-auto flex-1 text-sm text-gray-700"></div>
    <div class="mt-4 flex gap-2">
      <button id="btn-export-txt"    class="px-4 py-1.5 rounded bg-blue-600 text-white text-sm hover:bg-blue-700">Download Report</button>
      <button id="btn-report-close2" class="px-4 py-1.5 rounded border border-gray-300 text-sm hover:bg-gray-50">Close</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  window.PyLearn  —  Skulpt-powered Python runner + editor factory
//
//  Lesson JS has access to this global for all Python execution.
//
//  API:
//    PyLearn.runPython(code, [inputFn])
//      → Promise<{ output: string, error: string|null }>
//
//    PyLearn.createEditor(options)
//      options {
//        containerId  : string   – id of the <div> to mount inside
//        initialCode  : string   – starter code shown in editor
//        label        : string   – header label (default "Python Editor")
//        readOnly     : bool     – lock the textarea
//        showOutput   : bool     – show output panel (default true)
//        validate     : async (output, error, code)
//                         => { pass: bool, message: string } | null
//        onPass       : async () => void  – called when validate passes
//      }
//      → { getCode(), setCode(str), run() }
// ════════════════════════════════════════════════════════════════
window.PyLearn = (() => {

  // ── Core runner ─────────────────────────────────────────────
  // opts: { onOutput?(text), inputFn?(prompt) -> Promise<string> }
  // Returns { output, error, prompts } where:
  //   output  - only real print() output — input() prompts are stripped out
  //   prompts - array of prompt strings passed to each input() call
  //   error   - error string if execution failed, else null
  function runPython(code, opts) {
    if (typeof opts === 'function') opts = { inputFn: opts };
    opts = opts || {};
    return new Promise((resolve) => {
      let rawOutput = '';   // everything Skulpt writes — prompts AND print() output
      const prompts     = [];
      const onOutput    = opts.onOutput || null;
      const userInputFn = opts.inputFn  || (() => Promise.resolve(''));

      Sk.configure({
        output(text) {
          rawOutput += text;
          if (onOutput) onOutput(text);  // live UI still sees everything
        },
        read(file) {
          if (!Sk.builtinFiles || !Sk.builtinFiles.files[file])
            throw new Error("File not found: '" + file + "'");
          return Sk.builtinFiles.files[file];
        },
        inputfun: function(prompt) {
          // Collect the prompt — we'll strip it from output after the run
          prompts.push(prompt || '');
          return Promise.resolve(userInputFn(prompt || ''));
        },
        inputfunTakesPromise: true,
      });

      Sk.misceval.asyncToPromise(
        () => Sk.importMainWithBody('<stdin>', false, code, true)
      ).then(
        function() {
          // Strip all prompt strings from the raw output.
          // This works regardless of whether Skulpt writes prompts before or
          // after calling inputfun — we just remove them all at the end.
          var cleanOutput = rawOutput;
          prompts.forEach(function(p) {
            if (p) cleanOutput = cleanOutput.split(p).join('');
          });
          resolve({ output: cleanOutput, prompts: prompts, error: null });
        },
        function(err) {
          var cleanOutput = rawOutput;
          prompts.forEach(function(p) {
            if (p) cleanOutput = cleanOutput.split(p).join('');
          });
          resolve({ output: cleanOutput, prompts: prompts, error: err.toString() });
        }
      );
    });
  }

  // ── Editor factory ───────────────────────────────────────────
  function createEditor(opts) {
    opts = opts || {};
    const containerId = opts.containerId;
    const initialCode = opts.initialCode || '';
    const label       = opts.label       || 'Python Editor';
    const readOnly    = opts.readOnly    || false;
    const showOutput  = opts.showOutput  !== false;
    const validate    = opts.validate    || null;
    const onPass      = opts.onPass      || null;
    const persist     = opts.persist     !== false;  // Save code to localStorage by default

    const container = document.getElementById(containerId);
    if (!container) {
      console.error('PyLearn.createEditor: #' + containerId + ' not found');
      return null;
    }

    // Build markup
    const uid = containerId;

    // Storage key — saves student's code per step so it persists across navigation
    var storageKey = null;
    if (persist) {
      try {
        var lid = window.__pylearnCurrentLessonId;
        var sid = window.__pylearnCurrentStepId;
        if (lid && sid) {
          storageKey = 'pylearn_code:' + lid + ':' + sid + ':' + containerId;
        }
      } catch(e) {}
    }

    // Try to load previously saved code for this editor
    var startingCode = initialCode;
    if (storageKey) {
      try {
        var saved = localStorage.getItem(storageKey);
        if (saved !== null) startingCode = saved;
      } catch(e) {}
    }

    container.innerHTML =
      '<div class="pylearn-editor-wrap">' +
        '<div class="pylearn-editor-header">' +
          '<span>&#x1F40D; ' + label + '</span>' +
          '<span class="pylearn-header-tools">' +
            (storageKey && !readOnly ? '<button class="pylearn-btn-reset" id="' + uid + '-reset" title="Reset to starter code">&#x21BA; Reset</button>' : '') +
            '<span class="pylearn-status" id="' + uid + '-status">ready</span>' +
          '</span>' +
        '</div>' +
        '<textarea id="' + uid + '-code" class="pylearn-code-area"' +
          (readOnly ? ' readonly' : '') +
          ' spellcheck="false">' + escHtml(startingCode) + '</textarea>' +
        (showOutput
          ? '<div class="pylearn-output-area" id="' + uid + '-output">Output will appear here\u2026</div>'
          : '') +
        '<div class="pylearn-toolbar">' +
          '<button class="pylearn-btn-run" id="' + uid + '-run">&#9654; Run</button>' +
          (showOutput ? '<button class="pylearn-btn-clear" id="' + uid + '-clear">Clear</button>' : '') +
        '</div>' +
      '</div>' +
      '<div id="' + uid + '-feedback"></div>';

    const textarea   = document.getElementById(uid + '-code');
    const statusEl   = document.getElementById(uid + '-status');
    const outputEl   = showOutput ? document.getElementById(uid + '-output') : null;
    const runBtn     = document.getElementById(uid + '-run');
    const clearBtn   = showOutput ? document.getElementById(uid + '-clear') : null;
    const resetBtn   = (storageKey && !readOnly) ? document.getElementById(uid + '-reset') : null;
    const feedbackEl = document.getElementById(uid + '-feedback');

    // Auto-size: minimum 8 lines; if code is longer, grow to fit (cap 20 lines)
    var lineCount = (startingCode.match(/\n/g) || []).length + 1;
    var lines = Math.min(Math.max(lineCount + 2, 8), 20);
    textarea.style.height = (lines * 1.6) + 'rem';

    // Save on every keystroke
    if (storageKey) {
      textarea.addEventListener('input', function() {
        try { localStorage.setItem(storageKey, textarea.value); } catch(e) {}
      });
    }

    // Reset button: restore original starter code
    if (resetBtn) {
      resetBtn.onclick = function() {
        if (!confirm('Reset your code to the starting code? Your changes will be lost.')) return;
        textarea.value = initialCode;
        try { localStorage.removeItem(storageKey); } catch(e) {}
        if (outputEl) { outputEl.textContent = 'Output will appear here\u2026'; outputEl.classList.remove('has-error'); }
        feedbackEl.innerHTML = '';
        // Re-size textarea for the original code
        var lc = (initialCode.match(/\n/g) || []).length + 1;
        var ln = Math.min(Math.max(lc + 2, 8), 20);
        textarea.style.height = (ln * 1.6) + 'rem';
      };
    }

    // Tab key → 4 spaces
    textarea.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        var s = textarea.selectionStart, v = textarea.value;
        textarea.value = v.substring(0, s) + '    ' + v.substring(textarea.selectionEnd);
        textarea.selectionStart = textarea.selectionEnd = s + 4;
        // Trigger save
        if (storageKey) { try { localStorage.setItem(storageKey, textarea.value); } catch(e) {} }
      }
    });

    // Tell the Next button that this step has an editor (so it requires Run before completing)
    if (typeof window.__pylearnStepHasEditor !== 'undefined') {
      window.__pylearnStepHasEditor = true;
    }

    if (clearBtn) {
      clearBtn.onclick = function() {
        if (outputEl) { outputEl.textContent = ''; outputEl.classList.remove('has-error'); }
        feedbackEl.innerHTML = '';
        setStatus('', 'ready');
      };
    }

    function setStatus(type, msg) {
      statusEl.className = 'pylearn-status' + (type ? ' ' + type : '');
      statusEl.textContent = msg;
    }

    function showFeedback(type, msg) {
      feedbackEl.innerHTML = '<div class="pylearn-feedback ' + type + '">' + escHtml(msg) + '</div>';
    }

    runBtn.onclick = async function() {
      // Signal that the student has run the code on this step
      if (typeof window.__pylearnStepRan !== 'undefined') {
        window.__pylearnStepRan = true;
      }
      var code = textarea.value;
      runBtn.disabled = true;
      setStatus('run', 'running\u2026');
      if (outputEl) {
        outputEl.textContent = '';
        outputEl.classList.remove('has-error');
      }
      feedbackEl.innerHTML = '';

      // Live output streaming: append each chunk to the output element as it arrives
      var liveText = '';
      var onOutput = outputEl ? function(text) {
        liveText += text;
        outputEl.textContent = liveText;
        outputEl.scrollTop = outputEl.scrollHeight;
      } : null;

      // Live input: when Python calls input(prompt), show the prompt and let the
      // user type into the output area until they press Enter.
      var liveInputFn = outputEl ? function(prompt) {
        return new Promise(function(resolve) {
          // Show prompt as part of the output (prompt has no trailing newline)
          var promptText = prompt || '';
          liveText += promptText;
          outputEl.textContent = liveText;

          // Track what the user is typing (highlighted at the end of output)
          var typed = '';
          var promptLen = liveText.length;

          function render() {
            // Show the live output + a visual cursor
            outputEl.textContent = liveText.substring(0, promptLen) + typed + '\u2588';
            outputEl.scrollTop = outputEl.scrollHeight;
          }

          function onKeyDown(e) {
            // Don't capture keys typed in inputs/textareas elsewhere
            var t = e.target;
            if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
            if (e.key === 'Enter') {
              e.preventDefault();
              document.removeEventListener('keydown', onKeyDown);
              outputEl.classList.remove('pylearn-output-listening');
              // Commit: append the typed text + newline to liveText
              liveText = liveText.substring(0, promptLen) + typed + '\n';
              outputEl.textContent = liveText;
              outputEl.scrollTop = outputEl.scrollHeight;
              resolve(typed);
            } else if (e.key === 'Backspace') {
              e.preventDefault();
              typed = typed.slice(0, -1);
              render();
            } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
              // printable character
              e.preventDefault();
              typed += e.key;
              render();
            }
          }

          outputEl.classList.add('pylearn-output-listening');
          // Move focus away from the code textarea so keystrokes hit our handler
          if (document.activeElement && document.activeElement.blur) {
            document.activeElement.blur();
          }
          render();
          document.addEventListener('keydown', onKeyDown);
        });
      } : null;

      // If caller provided an explicit inputFn override, prefer that (used by validators)
      var effectiveInputFn = (typeof runBtn._inputFnOverride === 'function')
        ? runBtn._inputFnOverride
        : liveInputFn;

      var result = await runPython(code, {
        onOutput: onOutput,
        inputFn: effectiveInputFn,
      });

      if (outputEl) {
        // Final state
        if (result.error) {
          outputEl.textContent = (liveText || '') + (liveText && !liveText.endsWith('\n') ? '\n' : '') + result.error;
          outputEl.classList.add('has-error');
        } else if (!liveText) {
          outputEl.textContent = '(no output)';
        }
      }

      setStatus(result.error ? 'err' : 'ok', result.error ? 'error' : 'done');

      if (validate) {
        try {
          var fb = await validate(result.output, result.error, code);
          if (fb) {
            showFeedback(fb.pass ? 'pass' : 'fail', fb.message);
            if (fb.pass && onPass) await onPass();
          }
        } catch(ve) { console.error('Validation error:', ve); }
      }

      runBtn.disabled = false;
    };

    return {
      getCode: function()  { return textarea.value; },
      setCode: function(c) {
        textarea.value = c;
        if (storageKey) { try { localStorage.setItem(storageKey, c); } catch(e) {} }
      },
      run:     function()  { runBtn.click(); },
      // Set a function to provide input() answers automatically instead of asking the user.
      // Pass null to restore live keyboard input. Useful for demos where the answer is fixed.
      setInputFn: function(fn) { runBtn._inputFnOverride = fn || null; },
    };
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  return { runPython, createEditor };
})();


// ════════════════════════════════════════════════════════════════
//  APP STATE
// ════════════════════════════════════════════════════════════════
var state = {
  config: null,          // firebase.json contents
  lessonIndex: null,     // lessons/index.json contents
  yearGroups: [],        // [{ id, label, lessons: [meta] }]
  allLessons: [],        // all loaded { meta, data } across all year groups
  currentYearGroup: null,// id of the active year group
  lessons: [],           // filtered to currentYearGroup
  currentLessonIdx: 0,
  currentStepIdx: 0,
  isAdmin: false,
  db: null,
  uid: null,
  progress: {},
  stepStartTime: null,
  stepInjectedStyle: null,
  nameMap: {},           // { code → "First Last" } — local only, never sent to Firebase
};

// ── Utilities ────────────────────────────────────────────────
function genCode() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var seg = function() {
    return Array.from({length:4}, function() {
      return chars[Math.random()*chars.length|0];
    }).join('');
  };
  return seg()+'-'+seg()+'-'+seg();
}

function fmtMs(ms) {
  if (!ms || ms < 1000) return '< 1s';
  var s = Math.floor(ms/1000);
  if (s < 60) return s+'s';
  var m = Math.floor(s/60), rs = s%60;
  if (m < 60) return m+'m '+rs+'s';
  return Math.floor(m/60)+'h '+(m%60)+'m';
}

function getStepProgress(lid, sid) { return (state.progress[lid] && state.progress[lid][sid]) || {}; }
function isStepComplete(lid, sid)  { return !!getStepProgress(lid,sid).completed; }
function isStepStarted(lid, sid)   { var p = getStepProgress(lid,sid); return !!(p.started || p.startedAt); }
function isLessonComplete(lesson)  { return lesson.data.steps.every(function(s){ return isStepComplete(lesson.meta.id,s.id); }); }
function isLessonStarted(lesson)   { return lesson.data.steps.some(function(s){  return isStepStarted(lesson.meta.id,s.id);  }); }

// ── localStorage progress helpers ─────────────────────────────
// Local progress is stored independently of login, keyed by a device key.
// Key: 'pylearn_progress' → { lessonId: { stepId: { started, completed } } }
// Note: time tracking (totalMs, startedAt) is only stored in Firebase (needs login).
// Local storage only tracks started (boolean) and completed (boolean) for colour coding.

function localProgressKey() {
  return 'pylearn_progress';
}

function readLocalProgress() {
  try {
    var raw = localStorage.getItem(localProgressKey());
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function writeLocalProgress(progress) {
  try {
    // Only persist started/completed booleans — strip timestamps/time data to save space
    var slim = {};
    Object.keys(progress).forEach(function(lid) {
      slim[lid] = {};
      Object.keys(progress[lid]).forEach(function(sid) {
        var s = progress[lid][sid];
        slim[lid][sid] = {};
        if (s.startedAt || s.started) slim[lid][sid].started = true;
        if (s.completed) slim[lid][sid].completed = true;
      });
    });
    localStorage.setItem(localProgressKey(), JSON.stringify(slim));
  } catch(e) {}
}

// Merge Firebase progress into state.progress, then persist locally.
// Firebase is the source of truth for completed — once complete, always complete.
function mergeFirebaseProgress(firebaseProgress) {
  Object.keys(firebaseProgress).forEach(function(lid) {
    if (!state.progress[lid]) state.progress[lid] = {};
    Object.keys(firebaseProgress[lid]).forEach(function(sid) {
      var fb = firebaseProgress[lid][sid];
      var local = state.progress[lid][sid] || {};
      state.progress[lid][sid] = Object.assign({}, local, fb);
    });
  });
  writeLocalProgress(state.progress);
}

// ── Firebase helpers ─────────────────────────────────────────
function progressRef(lid, sid) { return state.db.ref('progress/'+state.uid+'/'+lid+'/'+sid); }

async function loadProgress() {
  // Always load local progress first — instant, no network needed
  state.progress = readLocalProgress();
  renderLessonTabs();
  renderStepBar();

  // If logged in, also fetch Firebase and merge (Firebase wins on conflicts)
  if (!state.uid) return;
  try {
    var snap = await state.db.ref('progress/'+state.uid).get();
    if (snap.exists()) {
      mergeFirebaseProgress(snap.val());
      renderLessonTabs();
      renderStepBar();
    }
  } catch(e) { console.warn('Could not load Firebase progress:', e); }
}

async function markStepStarted(lid, sid) {
  if (getStepProgress(lid,sid).startedAt || getStepProgress(lid,sid).started) return;
  var now = Date.now();
  if (!state.progress[lid]) state.progress[lid] = {};
  if (!state.progress[lid][sid]) state.progress[lid][sid] = {};
  state.progress[lid][sid].started = true;
  state.progress[lid][sid].startedAt = now;
  writeLocalProgress(state.progress);

  // Also write to Firebase if logged in
  if (state.uid) {
    state.stepStartTime = now;
    progressRef(lid,sid).update({ startedAt: now }).catch(function(){});
  }
}

async function saveStepTime() {
  var lesson = state.lessons[state.currentLessonIdx];
  var step   = lesson.data.steps[state.currentStepIdx];
  if (!state.uid || !state.stepStartTime) return;
  var elapsed  = Date.now() - state.stepStartTime;
  state.stepStartTime = null;
  var existing = getStepProgress(lesson.meta.id, step.id).totalMs || 0;
  var newTotal = existing + elapsed;
  if (!state.progress[lesson.meta.id]) state.progress[lesson.meta.id] = {};
  if (!state.progress[lesson.meta.id][step.id]) state.progress[lesson.meta.id][step.id] = {};
  state.progress[lesson.meta.id][step.id].totalMs = newTotal;
  progressRef(lesson.meta.id, step.id).update({ totalMs: newTotal }).catch(function(){});
}

async function markStepComplete(lid, sid) {
  if (!state.progress[lid]) state.progress[lid] = {};
  if (!state.progress[lid][sid]) state.progress[lid][sid] = {};
  state.progress[lid][sid].completed = true;
  state.progress[lid][sid].started   = true;
  writeLocalProgress(state.progress);

  // Also write to Firebase if logged in
  if (state.uid) {
    progressRef(lid,sid).update({ completed: true }).catch(function(){});
  }
  renderStepBar();
  renderLessonTabs();
}

// ── Load app data ─────────────────────────────────────────────
async function loadApp() {
  // Fetch firebase config and lesson index in parallel
  var results = await Promise.all([
    fetch('config/firebase.json').then(function(r) { return r.json(); }),
    fetch('lessons/index.json').then(function(r) { return r.json(); }),
  ]);
  state.config      = results[0];  // { firebase, adminCode }
  state.lessonIndex = results[1];  // { yearGroups: [...] }
  state.yearGroups  = state.lessonIndex.yearGroups;

  // Init Firebase
  firebase.initializeApp(state.config.firebase);
  state.db   = firebase.database();
  state.auth = firebase.auth();

  // Sign in anonymously — required for Firebase rules (auth != null).
  // We wait for the auth state to confirm before continuing so no writes
  // happen before the session is established.
  await new Promise(function(resolve) {
    var unsubscribe = state.auth.onAuthStateChanged(function(user) {
      if (user) {
        unsubscribe();
        resolve();
      }
    });
    state.auth.signInAnonymously().catch(function(e) {
      console.error('Firebase anonymous sign-in failed:', e.code, e.message);
      unsubscribe();
      resolve(); // continue anyway — local progress will still work
    });
  });

  // Load ALL lesson files across all year groups up front
  var lessonFilesNeeded = [];
  state.yearGroups.forEach(function(yg) {
    yg.lessons.forEach(function(meta) {
      // Attach yearGroupId to meta for filtering later
      meta.yearGroupId = yg.id;
      lessonFilesNeeded.push(meta);
    });
  });

  // Deduplicate by file path in case two year groups share a lesson file
  var seenFiles = {};
  var uniqueFiles = lessonFilesNeeded.filter(function(meta) {
    if (seenFiles[meta.file]) return false;
    seenFiles[meta.file] = true;
    return true;
  });

  var fetchedData = await Promise.all(
    uniqueFiles.map(function(meta) { return fetch(meta.file).then(function(r) { return r.json(); }); })
  );

  var fileDataMap = {};
  uniqueFiles.forEach(function(meta, i) { fileDataMap[meta.file] = fetchedData[i]; });

  // Build allLessons
  lessonFilesNeeded.forEach(function(meta) {
    state.allLessons.push({ meta: meta, data: fileDataMap[meta.file] });
  });

  // Build year group selector
  var select = document.getElementById('year-group-select');
  select.innerHTML = '';
  state.yearGroups.forEach(function(yg) {
    var opt = document.createElement('option');
    opt.value  = yg.id;
    opt.textContent = yg.label;
    select.appendChild(opt);
  });

  // Restore saved year group preference (or default to first)
  var savedYG = localStorage.getItem('pylearn_year_group');
  var initialYG = (savedYG && state.yearGroups.find(function(y){ return y.id === savedYG; }))
    ? savedYG
    : state.yearGroups[0].id;

  select.value = initialYG;
  select.onchange = function() {
    saveStepTime();
    applyYearGroup(select.value);
  };

  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('app-content').classList.remove('hidden');

  // Load local progress immediately so step colours are correct from first render
  state.progress = readLocalProgress();

  applyYearGroup(initialYG);
  setupAuthUI();
}

// Switch to a year group: filter lessons, reset navigation, re-render
function applyYearGroup(ygId) {
  localStorage.setItem('pylearn_year_group', ygId);
  state.currentYearGroup = ygId;

  // Filter allLessons to this year group, preserving original order
  state.lessons = state.allLessons.filter(function(l) { return l.meta.yearGroupId === ygId; });

  state.currentLessonIdx = 0;
  state.currentStepIdx   = 0;

  renderLessonTabs();
  if (state.lessons.length > 0) {
    loadStep(0, 0);
  }
}

// ── Render ────────────────────────────────────────────────────
function renderLessonTabs() {
  var container = document.getElementById('lesson-tabs');
  container.innerHTML = '';
  state.lessons.forEach(function(lesson, idx) {
    var complete = isLessonComplete(lesson);
    var started  = isLessonStarted(lesson);
    var active   = idx === state.currentLessonIdx;
    var btn = document.createElement('button');
    btn.className = 'lesson-tab px-3 py-1 rounded text-sm whitespace-nowrap border ' + (
      active    ? 'border-blue-500 bg-blue-50 text-blue-700 font-medium' :
      complete  ? 'border-green-400 bg-green-50 text-green-700 hover:bg-green-100' :
      started   ? 'border-yellow-400 bg-yellow-50 text-yellow-700 hover:bg-yellow-100' :
                  'border-gray-200 bg-white text-gray-600 hover:bg-gray-50');
    btn.textContent = lesson.data.title;
    btn.onclick = function() { saveStepTime(); loadLesson(idx); };
    container.appendChild(btn);
  });
}

function renderStepBar() {
  var container = document.getElementById('step-bar');
  container.innerHTML = '';
  var lesson = state.lessons[state.currentLessonIdx];
  lesson.data.steps.forEach(function(step, idx) {
    var complete = isStepComplete(lesson.meta.id, step.id);
    var started  = isStepStarted(lesson.meta.id, step.id);
    var active   = idx === state.currentStepIdx;
    var btn = document.createElement('button');
    btn.className = 'step-pill px-3 py-1 rounded text-xs border whitespace-nowrap ' + (
      active    ? 'border-blue-500 bg-blue-100 text-blue-700 font-semibold' :
      complete  ? 'border-green-400 bg-green-100 text-green-700 hover:bg-green-200' :
      started   ? 'border-yellow-400 bg-yellow-100 text-yellow-700 hover:bg-yellow-200' :
                  'border-gray-200 bg-white text-gray-500 hover:bg-gray-50');
    btn.textContent = step.title;
    btn.onclick = function() { saveStepTime(); loadStep(state.currentLessonIdx, idx); };
    container.appendChild(btn);
  });
}

// ── Load lesson / step ────────────────────────────────────────
function loadLesson(idx) {
  state.currentLessonIdx = idx;
  state.currentStepIdx   = 0;
  renderLessonTabs();
  loadStep(idx, 0);
}

function loadStep(lessonIdx, stepIdx) {
  state.currentLessonIdx = lessonIdx;
  state.currentStepIdx   = stepIdx;
  renderStepBar();

  var lesson = state.lessons[lessonIdx];
  var step   = lesson.data.steps[stepIdx];

  // Step CSS
  if (state.stepInjectedStyle) state.stepInjectedStyle.remove();
  if (step.css) {
    var styleEl = document.createElement('style');
    styleEl.textContent = step.css;
    document.head.appendChild(styleEl);
    state.stepInjectedStyle = styleEl;
  } else {
    state.stepInjectedStyle = null;
  }

  // Content
  document.getElementById('step-content').innerHTML = step.content;

  // Expose current location so createEditor can build a stable storage key
  window.__pylearnCurrentLessonId = lesson.meta.id;
  window.__pylearnCurrentStepId   = step.id;

  // Reset per-step flags used by the Next button
  // __pylearnStepHasEditor — set to true by createEditor on mount
  // __pylearnStepRan       — set to true when the Run button is clicked
  window.__pylearnStepHasEditor = false;
  window.__pylearnStepRan       = false;

  // Nav
  var total = lesson.data.steps.length;
  document.getElementById('step-counter').textContent = 'Step '+(stepIdx+1)+' of '+total;
  document.getElementById('btn-prev').disabled = stepIdx === 0;
  document.getElementById('btn-next').disabled = stepIdx === total - 1;
  document.getElementById('btn-next').textContent = stepIdx === total-1 ? 'Finish \u2713' : 'Next Step \u2192';

  // Mark step as started (always, for local progress colours)
  // Time tracking (stepStartTime) is set inside markStepStarted only when uid is set
  markStepStarted(lesson.meta.id, step.id);

  // API available to step JS
  window.__markStepComplete = async function() {
    await saveStepTime();
    await markStepComplete(lesson.meta.id, step.id);
  };

  // Step JS
  if (step.js) {
    setTimeout(function() {
      try { eval(step.js); } catch(e) { console.error('Step JS error:', e); }
    }, 50);
  }
}

// ── Navigation ────────────────────────────────────────────────
document.getElementById('btn-prev').onclick = async function() {
  await saveStepTime();
  if (state.currentStepIdx > 0) loadStep(state.currentLessonIdx, state.currentStepIdx-1);
};

document.getElementById('btn-next').onclick = async function() {
  var lesson = state.lessons[state.currentLessonIdx];
  var step   = lesson.data.steps[state.currentStepIdx];
  await saveStepTime();

  if (step.autoComplete !== false) {
    // If the step has an editor but the student hasn't run the code yet, nudge them
    if (window.__pylearnStepHasEditor && !window.__pylearnStepRan) {
      var nextBtn = document.getElementById('btn-next');
      var original = nextBtn.textContent;
      nextBtn.textContent = 'Try the code first! \u25B6';
      nextBtn.classList.add('bg-yellow-500', 'hover:bg-yellow-600');
      nextBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
      setTimeout(function() {
        nextBtn.textContent = original;
        nextBtn.classList.remove('bg-yellow-500', 'hover:bg-yellow-600');
        nextBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
      }, 2000);
      return;
    }
    await markStepComplete(lesson.meta.id, step.id);
  }

  var next = state.currentStepIdx + 1;
  if (next < lesson.data.steps.length) loadStep(state.currentLessonIdx, next);
};

// ── Auth ──────────────────────────────────────────────────────
function setupAuthUI() {
  var modalLogin = document.getElementById('modal-login');

  document.getElementById('btn-login').onclick = function() {
    modalLogin.classList.remove('hidden');
    var saved = localStorage.getItem('pylearn_name');
    if (saved) {
      var n = JSON.parse(saved);
      document.getElementById('input-first').value = n.first || '';
      document.getElementById('input-last').value  = n.last  || '';
    }
  };

  document.getElementById('btn-login-cancel').onclick = function() { modalLogin.classList.add('hidden'); };

  document.getElementById('btn-login-submit').onclick = async function() {
    var first = document.getElementById('input-first').value.trim();
    var last  = document.getElementById('input-last').value.trim();
    var code  = document.getElementById('input-code').value.trim().toUpperCase();
    var errEl = document.getElementById('login-error');
    errEl.classList.add('hidden');

    if (!first||!last) { errEl.textContent='Please enter your name.';       errEl.classList.remove('hidden'); return; }
    if (!code)         { errEl.textContent='Please enter your login code.'; errEl.classList.remove('hidden'); return; }

    if (code === state.config.adminCode) {
      localStorage.setItem('pylearn_name', JSON.stringify({first:first,last:last}));
      localStorage.setItem('pylearn_code', code);
      state.isAdmin=true; state.uid='admin';
      // Register this browser's anonymous UID as an admin in Firebase.
      // The rule only allows this write if the value equals the admin code — 
      // so only someone who knows the code can become an admin.
      try {
        var firebaseUid = state.auth.currentUser && state.auth.currentUser.uid;
        if (firebaseUid) {
          await state.db.ref('admins/' + firebaseUid).set(state.config.adminCode);
        }
      } catch(e) { console.warn('Could not register admin session:', e.message); }
      modalLogin.classList.add('hidden');
      updateAuthUI(first,last,true);
      return;
    }
    try {
      // Search for the code across all classes
      var classesSnap = await state.db.ref('classes').get();
      var foundClass = null;
      if (classesSnap.exists()) {
        classesSnap.forEach(function(classSnap) {
          var codesSnap = classSnap.child('codes');
          if (codesSnap.child(code).exists()) {
            foundClass = classSnap.key;
          }
        });
      }
      if (!foundClass) { errEl.textContent='Invalid code. Please ask your teacher.'; errEl.classList.remove('hidden'); return; }
      localStorage.setItem('pylearn_name', JSON.stringify({first:first,last:last}));
      localStorage.setItem('pylearn_code', code);
      state.uid=code; state.isAdmin=false;
      await loadProgress();
      renderLessonTabs(); renderStepBar();
      modalLogin.classList.add('hidden');
      updateAuthUI(first,last,false);
    } catch(e) { errEl.textContent='Error connecting. Please try again.'; errEl.classList.remove('hidden'); }
  };

  document.getElementById('btn-logout').onclick = async function() {
    await saveStepTime();
    localStorage.removeItem('pylearn_code');
    // Clear all saved per-step code so the next student doesn't see this one's work
    try {
      for (var i = localStorage.length - 1; i >= 0; i--) {
        var k = localStorage.key(i);
        if (k && (k.indexOf('pylearn_code:') === 0)) localStorage.removeItem(k);
      }
    } catch(e) {}
    // Clear local progress so the next student starts fresh on this device
    try { localStorage.removeItem(localProgressKey()); } catch(e) {}
    state.uid=null; state.isAdmin=false; state.progress={};
    updateAuthUI(null,null,false);
    renderLessonTabs(); renderStepBar();
  };

  document.getElementById('btn-report').onclick = showReport;
  document.getElementById('btn-admin').onclick   = showAdmin;
  document.getElementById('btn-admin-close').onclick  = function(){ document.getElementById('modal-admin').classList.add('hidden'); };
  document.getElementById('btn-report-close').onclick  = function(){ document.getElementById('modal-report').classList.add('hidden'); };
  document.getElementById('btn-report-close2').onclick = function(){ document.getElementById('modal-report').classList.add('hidden'); };
  document.getElementById('btn-export-txt').onclick   = exportReport;

  // Auto-login
  var savedCode = localStorage.getItem('pylearn_code');
  var savedName = localStorage.getItem('pylearn_name');
  if (savedCode && savedName) {
    var n = JSON.parse(savedName);
    if (savedCode === state.config.adminCode) {
      state.uid='admin'; state.isAdmin=true;
      // Re-register admin UID on page refresh so Firebase rules still recognise them
      try {
        var firebaseUid = state.auth.currentUser && state.auth.currentUser.uid;
        if (firebaseUid) {
          state.db.ref('admins/' + firebaseUid).set(state.config.adminCode).catch(function(){});
        }
      } catch(e) {}
      updateAuthUI(n.first,n.last,true);
    } else {
      state.uid=savedCode;
      loadProgress().then(function(){ renderLessonTabs(); renderStepBar(); });
      updateAuthUI(n.first,n.last,false);
    }
  }
}

function updateAuthUI(first, last, isAdmin) {
  var show = !!first;
  document.getElementById('btn-login').classList.toggle('hidden',  show);
  document.getElementById('btn-logout').classList.toggle('hidden', !show);
  document.getElementById('btn-report').classList.toggle('hidden', !show||isAdmin);
  document.getElementById('btn-admin').classList.toggle('hidden',  !isAdmin);
  document.getElementById('user-label').textContent = show ? first+' '+last : '';
}

// ── Admin ─────────────────────────────────────────────────────
async function showAdmin() {
  document.getElementById('modal-admin').classList.remove('hidden');
  await refreshAdminTable();
}

// ── Helpers ───────────────────────────────────────────────────
function studentName(code) {
  return state.nameMap[code] || null;
}

function stepStatus(prog, lid, sid) {
  var s = (prog[lid] && prog[lid][sid]) || {};
  if (s.completed)              return 'complete';
  if (s.started || s.startedAt) return 'started';
  return 'not started';
}

// ── Admin table ───────────────────────────────────────────────
async function refreshAdminTable() {
  var container = document.getElementById('admin-classes-container');
  container.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">Loading\u2026</p>';
  try {
    var results = await Promise.all([
      state.db.ref('classes').get(),
      state.db.ref('progress').get(),
    ]);
    var classesSnap = results[0];
    var allProg     = results[1].exists() ? results[1].val() : {};

    if (!classesSnap.exists()) {
      container.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">No classes yet. Generate some codes above.</p>';
      return;
    }

    container.innerHTML = '';
    classesSnap.forEach(function(classSnap) {
      var className = classSnap.key;
      var codes     = classSnap.child('codes').val() || {};
      var codeList  = Object.keys(codes);
      var hasNames  = codeList.some(function(c) { return !!state.nameMap[c]; });

      // Section header
      var header = document.createElement('div');
      header.className = 'flex items-center justify-between py-2 px-1 mb-2 mt-4 border-b-2 border-gray-200';
      header.innerHTML =
        '<span class="font-semibold text-gray-800">' + className + '</span>' +
        '<span class="text-xs text-gray-400 mr-auto ml-3">' + codeList.length + ' student' + (codeList.length !== 1 ? 's' : '') + '</span>' +
        '<div class="flex gap-2">' +
          '<button class="btn-export-detail px-3 py-1 rounded border border-green-300 text-green-700 text-xs hover:bg-green-50" data-class="' + className + '">&#x2193; Detailed Report</button>' +
          '<button class="btn-export-class px-3 py-1 rounded border border-blue-300 text-blue-600 text-xs hover:bg-blue-50" data-class="' + className + '">&#x2193; Codes Sheet</button>' +
          '<button class="btn-delete-class px-3 py-1 rounded border border-red-300 text-red-600 text-xs hover:bg-red-50" data-class="' + className + '">\uD83D\uDDD1 Delete class</button>' +
        '</div>';
      container.appendChild(header);

      // Build columns: Name (if names loaded), Code, then per-lesson columns
      var table = document.createElement('table');
      table.className = 'w-full text-xs mb-4 border-collapse';

      // Header row
      var thead = document.createElement('thead');
      var htr   = document.createElement('tr');
      htr.className = 'text-left text-gray-500 bg-gray-50';

      function th(text, cls) {
        var cell = document.createElement('th');
        cell.className = 'border border-gray-200 px-2 py-1.5 font-medium ' + (cls || '');
        cell.textContent = text;
        return cell;
      }

      if (hasNames) htr.appendChild(th('Name', 'min-w-[120px]'));
      htr.appendChild(th('Code', 'font-mono'));
      htr.appendChild(th('Steps done'));
      htr.appendChild(th('Time'));

      // One column per lesson
      state.allLessons.forEach(function(lesson) {
        var cell = th(lesson.data.title, 'text-center');
        cell.colSpan = lesson.data.steps.length;
        htr.appendChild(cell);
      });

      thead.appendChild(htr);

      // Sub-header: step names
      var htr2 = document.createElement('tr');
      htr2.className = 'text-left text-gray-400 bg-gray-50';
      if (hasNames) htr2.appendChild(th(''));
      htr2.appendChild(th(''));
      htr2.appendChild(th(''));
      htr2.appendChild(th(''));
      state.allLessons.forEach(function(lesson) {
        lesson.data.steps.forEach(function(step) {
          var cell = document.createElement('th');
          cell.className = 'border border-gray-200 px-1 py-1 font-normal text-center text-gray-400 whitespace-nowrap';
          cell.style.maxWidth = '80px';
          cell.style.overflow = 'hidden';
          cell.style.textOverflow = 'ellipsis';
          cell.title = step.title;
          cell.textContent = step.title.length > 10 ? step.title.slice(0, 9) + '\u2026' : step.title;
          htr2.appendChild(cell);
        });
      });
      thead.appendChild(htr2);
      table.appendChild(thead);

      // Data rows
      var tbody = document.createElement('tbody');
      codeList.forEach(function(code) {
        var prog = allProg[code] || {};
        var name = state.nameMap[code] || null;

        // Compute totals
        var stepsDone = 0, totalMs = 0;
        Object.keys(prog).forEach(function(lid) {
          Object.keys(prog[lid]).forEach(function(sid) {
            var s = prog[lid][sid];
            if (s.completed) stepsDone++;
            if (s.totalMs)   totalMs += s.totalMs;
          });
        });

        var tr = document.createElement('tr');
        tr.className = 'border-b border-gray-100 hover:bg-gray-50';

        function td(text, cls) {
          var cell = document.createElement('td');
          cell.className = 'border border-gray-100 px-2 py-1.5 ' + (cls || '');
          cell.textContent = text;
          return cell;
        }

        if (hasNames) tr.appendChild(td(name || '—', name ? 'font-medium text-gray-800' : 'text-gray-400'));
        tr.appendChild(td(code, 'font-mono text-gray-500'));
        tr.appendChild(td(stepsDone || '—', 'text-center'));
        tr.appendChild(td(totalMs ? fmtMs(totalMs) : '—'));

        // Per-step cells
        state.allLessons.forEach(function(lesson) {
          lesson.data.steps.forEach(function(step) {
            var status = stepStatus(prog, lesson.meta.id, step.id);
            var cell   = document.createElement('td');
            cell.className = 'border border-gray-100 text-center px-1 py-1';
            var ms = (prog[lesson.meta.id] && prog[lesson.meta.id][step.id] && prog[lesson.meta.id][step.id].totalMs) || 0;
            if (status === 'complete') {
              cell.innerHTML = '<span title="Complete' + (ms ? ' \u00b7 ' + fmtMs(ms) : '') + '" class="text-green-600 font-bold">\u2713</span>';
            } else if (status === 'started') {
              cell.innerHTML = '<span title="Started' + (ms ? ' \u00b7 ' + fmtMs(ms) : '') + '" class="text-yellow-500">\u25CB</span>';
            } else {
              cell.innerHTML = '<span class="text-gray-200">\u2013</span>';
            }
            tr.appendChild(cell);
          });
        });

        // Delete button cell
        var delTd = document.createElement('td');
        delTd.className = 'border border-gray-100 px-2 py-1';
        var delBtn = document.createElement('button');
        delBtn.className = 'btn-delete-code text-red-400 hover:text-red-600';
        delBtn.dataset.class = className;
        delBtn.dataset.code  = code;
        delBtn.textContent   = 'Remove';
        delTd.appendChild(delBtn);
        tr.appendChild(delTd);

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      container.appendChild(table);
    });

    // ── Wire up buttons ──────────────────────────────────────
    container.querySelectorAll('.btn-export-class').forEach(function(btn) {
      btn.onclick = function() { exportCodesSheet(btn.dataset.class); };
    });

    container.querySelectorAll('.btn-export-detail').forEach(function(btn) {
      btn.onclick = function() { exportDetailedReport(btn.dataset.class); };
    });

    container.querySelectorAll('.btn-delete-class').forEach(function(btn) {
      btn.onclick = async function() {
        var cn = btn.dataset.class;
        if (!confirm('Delete all codes for class ' + cn + '? This cannot be undone.')) return;
        btn.disabled = true; btn.textContent = 'Deleting\u2026';
        try { await state.db.ref('classes/' + cn).remove(); await refreshAdminTable(); }
        catch(e) { alert('Error: ' + e.message); btn.disabled = false; btn.textContent = '\uD83D\uDDD1 Delete class'; }
      };
    });

    container.querySelectorAll('.btn-delete-code').forEach(function(btn) {
      btn.onclick = async function() {
        var code = btn.dataset.code, cn = btn.dataset.class;
        if (!confirm('Remove code ' + code + ' from ' + cn + '?')) return;
        btn.disabled = true; btn.textContent = '\u2026';
        try { await state.db.ref('classes/' + cn + '/codes/' + code).remove(); await refreshAdminTable(); }
        catch(e) { alert('Error: ' + e.message); btn.disabled = false; btn.textContent = 'Remove'; }
      };
    });

  } catch(e) {
    container.innerHTML = '<p class="text-red-400 text-sm text-center py-4">Error loading data: ' + e.message + '</p>';
  }
}

// ── Export: codes-only sheet (for handing out to students) ─────
function exportCodesSheet(className) {
  state.db.ref('classes/' + className + '/codes').get().then(function(snap) {
    var codes = snap.exists() ? Object.keys(snap.val()) : [];
    var wb = XLSX.utils.book_new();
    var wsData = [['Name', 'Code']];
    codes.forEach(function(code) { wsData.push([state.nameMap[code] || '', code]); });
    var ws = XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols'] = [{ wch: 30 }, { wch: 20 }];
    XLSX.utils.book_append_sheet(wb, ws, 'Codes');
    XLSX.writeFile(wb, 'PyLearn-' + className + '-codes.xlsx');
  }).catch(function(e) { alert('Could not export: ' + e.message); });
}

// ── Export: detailed report workbook ─────────────────────────
async function exportDetailedReport(className) {
  try {
    var results = await Promise.all([
      state.db.ref('classes/' + className + '/codes').get(),
      state.db.ref('progress').get(),
    ]);
    var codesSnap = results[0];
    var allProg   = results[1].exists() ? results[1].val() : {};
    if (!codesSnap.exists()) { alert('No codes found for ' + className); return; }
    var codes = Object.keys(codesSnap.val());

    var wb = XLSX.utils.book_new();

    // ── Sheet 1: Codes ──────────────────────────────────────
    var codesData = [['Name', 'Code']];
    codes.forEach(function(code) { codesData.push([state.nameMap[code] || '', code]); });
    var wsCodesSheet = XLSX.utils.aoa_to_sheet(codesData);
    wsCodesSheet['!cols'] = [{ wch: 30 }, { wch: 20 }];
    XLSX.utils.book_append_sheet(wb, wsCodesSheet, 'Codes');

    // ── Sheet 2: Summary ────────────────────────────────────
    var summaryHdr = ['Name', 'Code', 'Total Steps Done', 'Total Time'];
    state.allLessons.forEach(function(lesson) {
      summaryHdr.push(lesson.data.title + ' Steps Done');
      summaryHdr.push(lesson.data.title + ' Time');
    });
    var summaryData = [summaryHdr];

    codes.forEach(function(code) {
      var prog = allProg[code] || {};
      var name = state.nameMap[code] || '';
      var totalDone = 0, totalMs = 0;
      var row = [name, code];
      var lessonCells = [];
      state.allLessons.forEach(function(lesson) {
        var done = 0, ms = 0;
        lesson.data.steps.forEach(function(step) {
          var s = (prog[lesson.meta.id] && prog[lesson.meta.id][step.id]) || {};
          if (s.completed) { done++; totalDone++; }
          if (s.totalMs)   { ms += s.totalMs; totalMs += s.totalMs; }
        });
        lessonCells.push(done + ' / ' + lesson.data.steps.length);
        lessonCells.push(ms ? fmtMs(ms) : '—');
      });
      row.push(totalDone);
      row.push(totalMs ? fmtMs(totalMs) : '—');
      summaryData.push(row.concat(lessonCells));
    });

    var wsSummary = XLSX.utils.aoa_to_sheet(summaryData);
    wsSummary['!cols'] = [{ wch: 25 }, { wch: 20 }, { wch: 16 }, { wch: 14 }];
    state.allLessons.forEach(function() {
      wsSummary['!cols'].push({ wch: 18 }); wsSummary['!cols'].push({ wch: 12 });
    });

    // Add chart data for step completion (simple bar chart source)
    var chartAnchorRow = summaryData.length + 3;
    var chartHdr = ['Student'].concat(state.allLessons.map(function(l) { return l.data.title; }));
    var chartData = [chartHdr];
    codes.forEach(function(code) {
      var prog = allProg[code] || {};
      var name = state.nameMap[code] || code;
      var row = [name];
      state.allLessons.forEach(function(lesson) {
        var done = 0;
        lesson.data.steps.forEach(function(step) {
          var s = (prog[lesson.meta.id] && prog[lesson.meta.id][step.id]) || {};
          if (s.completed) done++;
        });
        row.push(done);
      });
      chartData.push(row);
    });

    XLSX.utils.sheet_add_aoa(wsSummary, chartData, { origin: { r: chartAnchorRow, c: 0 } });
    XLSX.utils.book_append_sheet(wb, wsSummary, 'Summary');

    // ── One sheet per lesson ─────────────────────────────────
    state.allLessons.forEach(function(lesson) {
      var lid  = lesson.meta.id;
      var steps = lesson.data.steps;

      var hdr = ['Name', 'Code'];
      steps.forEach(function(step) { hdr.push(step.title); hdr.push(step.title + ' Time'); });
      hdr.push('Total Done'); hdr.push('Total Time');

      var wsData = [hdr];
      codes.forEach(function(code) {
        var prog = allProg[code] || {};
        var name = state.nameMap[code] || '';
        var row  = [name, code];
        var totalDone = 0, totalMs = 0;
        steps.forEach(function(step) {
          var s    = (prog[lid] && prog[lid][step.id]) || {};
          var done = s.completed ? 1 : 0;
          var ms   = s.totalMs  || 0;
          totalDone += done;
          totalMs   += ms;
          row.push(done ? '\u2713' : (s.started || s.startedAt ? '\u25CB' : '\u2013'));
          row.push(ms ? fmtMs(ms) : '—');
        });
        row.push(totalDone + ' / ' + steps.length);
        row.push(totalMs ? fmtMs(totalMs) : '—');
        wsData.push(row);
      });

      var ws = XLSX.utils.aoa_to_sheet(wsData);
      ws['!cols'] = [{ wch: 25 }, { wch: 20 }];
      steps.forEach(function() { ws['!cols'].push({ wch: 8 }); ws['!cols'].push({ wch: 10 }); });
      ws['!cols'].push({ wch: 10 }); ws['!cols'].push({ wch: 10 });

      // Truncate sheet name to 31 chars (Excel limit)
      var sheetName = lesson.data.title.slice(0, 31);
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
    });

    XLSX.writeFile(wb, 'PyLearn-' + className + '-report.xlsx');

  } catch(e) { alert('Export failed: ' + e.message); }
}

// ── Import names from spreadsheet ────────────────────────────
function importNamesFromSheet(file) {
  var statusEl = document.getElementById('import-status');
  statusEl.textContent = 'Reading file\u2026';
  statusEl.classList.remove('hidden');
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var wb   = XLSX.read(data, { type: 'array' });
      // Find the Codes sheet (first sheet, or sheet named 'Codes')
      var sheetName = wb.SheetNames.indexOf('Codes') !== -1 ? 'Codes' : wb.SheetNames[0];
      var ws   = wb.Sheets[sheetName];
      var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      var imported = 0;
      var skipped  = 0;
      rows.forEach(function(row, idx) {
        // Skip the header row — detect it by checking if column B looks like a code
        // Don't just skip idx===0 blindly in case the sheet has no header
        var name = (row[0] || '').toString().trim();
        var code = (row[1] || '').toString().trim().toUpperCase().replace(/\s+/g, '');

        // If this looks like the header row, skip it
        if (name.toLowerCase() === 'name' && code.toLowerCase() === 'code') return;
        // Also skip truly empty rows
        if (!name && !code) return;

        if (name && code && code.match(/^[A-Z0-9]{3,}-/)) {
          state.nameMap[code] = name;
          imported++;
        } else {
          skipped++;
        }
      });

      if (imported === 0) {
        statusEl.textContent = '\u26A0\uFE0F No names imported. Make sure column A = Name, column B = Code (format like XXXX-XXXX-XXXX). Rows skipped: ' + skipped;
      } else {
        var msg = '\u2705 Imported ' + imported + ' name' + (imported !== 1 ? 's' : '') + '.';
        if (skipped > 0) msg += ' (' + skipped + ' rows skipped — missing name or unrecognised code format.)';
        msg += ' Names are local only \u2014 not saved to Firebase.';
        statusEl.textContent = msg;
        refreshAdminTable();
      }
    } catch(err) {
      statusEl.textContent = '\u274C Error reading file: ' + err.message;
    }
  };
  reader.readAsArrayBuffer(file);
}

document.getElementById('btn-gen-codes').onclick = async function() {
  var rawName  = document.getElementById('input-class-name').value.trim().toUpperCase();
  var count    = parseInt(document.getElementById('input-code-count').value, 10);
  var statusEl = document.getElementById('gen-status');

  if (!rawName) { statusEl.textContent = 'Please enter a class name.'; statusEl.classList.remove('hidden'); return; }
  if (!count || count < 1 || count > 60) { statusEl.textContent = 'Number of codes must be between 1 and 60.'; statusEl.classList.remove('hidden'); return; }

  statusEl.textContent = 'Generating ' + count + ' codes for ' + rawName + '\u2026';
  statusEl.classList.remove('hidden');
  document.getElementById('btn-gen-codes').disabled = true;

  try {
    var updates = {};
    var generated = [];
    for (var i = 0; i < count; i++) {
      var code = genCode();
      generated.push(code);
      updates['classes/' + rawName + '/codes/' + code] = { createdAt: Date.now() };
    }
    await state.db.ref().update(updates);
    statusEl.textContent = '\u2705 Generated ' + count + ' codes for ' + rawName + '.';
    await refreshAdminTable();
  } catch(e) {
    statusEl.textContent = '\u274c Error: ' + e.message;
  }

  document.getElementById('btn-gen-codes').disabled = false;
};

document.getElementById('btn-refresh-codes').onclick = refreshAdminTable;

document.getElementById('btn-add-single').onclick = async function() {
  var className = document.getElementById('input-single-class').value.trim().toUpperCase();
  var statusEl  = document.getElementById('gen-status');
  if (!className) { statusEl.textContent = 'Please enter a class name.'; statusEl.classList.remove('hidden'); return; }
  statusEl.textContent = 'Adding code to ' + className + '\u2026';
  statusEl.classList.remove('hidden');
  try {
    var code = genCode();
    await state.db.ref('classes/' + className + '/codes/' + code).set({ createdAt: Date.now() });
    statusEl.textContent = '\u2705 Added code ' + code + ' to ' + className + '.';
    await refreshAdminTable();
  } catch(e) {
    statusEl.textContent = '\u274c Error: ' + e.message;
  }
};

// Import names: clicking button triggers hidden file input
document.getElementById('btn-import-names').onclick = function() {
  document.getElementById('input-import-names').click();
};
document.getElementById('input-import-names').onchange = function(e) {
  var file = e.target.files[0];
  if (file) {
    importNamesFromSheet(file);
    // Reset so the same file can be re-imported
    e.target.value = '';
  }
};

// ── Report ────────────────────────────────────────────────────
function showReport() {
  document.getElementById('modal-report').classList.remove('hidden');
  var el   = document.getElementById('report-content');
  var name = (function(){ try{ var n=JSON.parse(localStorage.getItem('pylearn_name')); return n.first+' '+n.last; }catch(e){ return 'Student'; } })();
  var html = '<p class="mb-3 font-semibold">'+name+' \u2014 '+new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})+'</p>';
  state.lessons.forEach(function(lesson){
    var lid=lesson.meta.id, complete=isLessonComplete(lesson), started=isLessonStarted(lesson);
    var cls=complete?'text-green-700 bg-green-50 border-green-200':started?'text-yellow-700 bg-yellow-50 border-yellow-200':'text-gray-500 bg-gray-50 border-gray-200';
    var status=complete?'Complete':started?'In Progress':'Not Started';
    var lessonMs=0; lesson.data.steps.forEach(function(s){ lessonMs+=getStepProgress(lid,s.id).totalMs||0; });
    html+='<div class="mb-4 border rounded-lg p-3 '+cls+'"><div class="flex justify-between items-center mb-2"><span class="font-medium">'+lesson.data.title+'</span><span class="text-xs">'+status+' \u00b7 '+fmtMs(lessonMs)+'</span></div>';
    html+='<table class="w-full text-xs"><thead><tr class="text-left opacity-70"><th class="pb-1 pr-3">Step</th><th class="pb-1 pr-3">Status</th><th class="pb-1">Time</th></tr></thead><tbody>';
    lesson.data.steps.forEach(function(step){
      var sp=getStepProgress(lid,step.id);
      var st=sp.completed?'\u2705 Complete':sp.startedAt?'\uD83D\uDFE1 Started':'\u2B1C Not started';
      html+='<tr><td class="pr-3 py-0.5">'+step.title+'</td><td class="pr-3">'+st+'</td><td>'+fmtMs(sp.totalMs)+'</td></tr>';
    });
    html+='</tbody></table></div>';
  });
  el.innerHTML=html;
}

function exportReport() {
  var name=(function(){ try{ var n=JSON.parse(localStorage.getItem('pylearn_name')); return n.first+' '+n.last; }catch(e){ return 'Student'; } })();
  var txt='PyLearn Progress Report\n'+name+'\n'+new Date().toLocaleString('en-GB')+'\n'+'='.repeat(40)+'\n\n';
  state.lessons.forEach(function(lesson){
    var lid=lesson.meta.id, lessonMs=0;
    lesson.data.steps.forEach(function(s){ lessonMs+=getStepProgress(lid,s.id).totalMs||0; });
    var status=isLessonComplete(lesson)?'COMPLETE':isLessonStarted(lesson)?'IN PROGRESS':'NOT STARTED';
    txt+='Lesson: '+lesson.data.title+' ['+status+'] - '+fmtMs(lessonMs)+'\n';
    lesson.data.steps.forEach(function(step){
      var sp=getStepProgress(lid,step.id);
      txt+='  \u2022 '+step.title+': '+(sp.completed?'Complete':sp.startedAt?'Started':'Not started')+' ('+fmtMs(sp.totalMs)+')\n';
    });
    txt+='\n';
  });
  var blob=new Blob([txt],{type:'text/plain'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='pylearn-report-'+name.replace(/\s/g,'-').toLowerCase()+'.txt';
  a.click();
}

});
